name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Gradle on CI often uses ANDROID_* env only and never creates android/local.properties — pin sdk.dir explicitly.
  android-apks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Copy root index.html into www (single source of truth)
        run: npm run copy:www

      - name: Sync web assets and Capacitor
        run: npx cap sync android

      - name: Pin sdk.dir for both Gradle projects (do not rely on local.properties being auto-created)
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            echo "Android SDK not found. ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT ANDROID_HOME=$ANDROID_HOME"
            exit 1
          fi
          echo "Using SDK: $SDK"
          echo "sdk.dir=$SDK" > android/local.properties
          echo "sdk.dir=$SDK" > android-native-app/local.properties

      - name: Gradle executable (Capacitor)
        run: chmod +x android/gradlew

      - name: Assemble Capacitor debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Capacitor debug APK
        uses: actions/upload-artifact@v4
        with:
          name: entrance-pass-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Copy index.html into native app assets
        run: npm run copy:native-android

      - name: Restore sdk.dir for native shell (copy step must not drop it)
        run: |
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          echo "sdk.dir=$SDK" > android-native-app/local.properties

      - name: Gradle executable (native shell)
        run: chmod +x android-native-app/gradlew

      - name: Assemble native shell debug APK
        working-directory: android-native-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload native shell APK
        uses: actions/upload-artifact@v4
        with:
          name: entrance-pass-native-shell
          path: android-native-app/app/build/outputs/apk/debug/app-debug.apk
