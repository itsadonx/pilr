name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  debug-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Copy root index.html into www (single source of truth)
        run: npm run copy:www

      - name: Sync web assets and Capacitor
        run: npx cap sync android

      - name: Gradle executable
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: entrance-pass-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

  # Standalone Kotlin WebView + AndroidPrint JavascriptInterface (reliable print; no Capacitor)
  native-shell-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "platforms;android-35 build-tools;35.0.0"

      - name: Copy index.html into native app assets
        run: npm run copy:native-android

      - name: Gradle SDK location (CI has no committed local.properties)
        run: |
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
          if [ ! -d "$SDK" ]; then echo "Android SDK not found at: $SDK"; exit 1; fi
          echo "sdk.dir=$SDK" > android-native-app/local.properties

      - name: Gradle executable
        run: chmod +x android-native-app/gradlew

      - name: Assemble native shell debug APK
        working-directory: android-native-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload native shell APK
        uses: actions/upload-artifact@v4
        with:
          name: entrance-pass-native-shell
          path: android-native-app/app/build/outputs/apk/debug/app-debug.apk
