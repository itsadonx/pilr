name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # Single job: Capacitor build bootstraps the Android SDK (local.properties); native shell reuses the same sdk.dir.
  android-apks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      # --- Capacitor debug APK (Gradle downloads SDK; writes android/local.properties) ---
      - name: Copy root index.html into www (single source of truth)
        run: npm run copy:www

      - name: Sync web assets and Capacitor
        run: npx cap sync android

      - name: Gradle executable (Capacitor)
        run: chmod +x android/gradlew

      - name: Assemble Capacitor debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Capacitor debug APK
        uses: actions/upload-artifact@v4
        with:
          name: entrance-pass-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # --- Native Kotlin WebView shell (same SDK path — no separate setup-android step) ---
      - name: Copy index.html into native app assets
        run: npm run copy:native-android

      - name: Point native shell at same Android SDK as Capacitor
        run: |
          if [ ! -f android/local.properties ]; then
            echo "android/local.properties missing after Capacitor build."
            exit 1
          fi
          SDK=$(grep '^sdk.dir=' android/local.properties | sed 's/^sdk.dir=//' | tr -d '\r')
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            echo "Invalid or missing sdk.dir from android/local.properties: [$SDK]"
            exit 1
          fi
          echo "sdk.dir=$SDK" > android-native-app/local.properties

      - name: Gradle executable (native shell)
        run: chmod +x android-native-app/gradlew

      - name: Assemble native shell debug APK
        working-directory: android-native-app
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload native shell APK
        uses: actions/upload-artifact@v4
        with:
          name: entrance-pass-native-shell
          path: android-native-app/app/build/outputs/apk/debug/app-debug.apk
